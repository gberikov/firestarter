<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Пуск ракеты</title>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, viewport-fit=cover'>
    <style>
        :root {
            --bg:        #08090c;
            --ink:       #eef1f5;
            --muted:     #6b7480;
            --muted-2:   #444c57;
            --line:      rgba(255,255,255,.07);
            --line-2:    rgba(255,255,255,.12);
            --amber:     #ff8a1e;
            --amber-2:   #ffb24d;
            --amber-soft:rgba(255,138,30,.45);
            --hot:       #ff3b30;
            --hot-soft:  rgba(255,59,48,.5);
            --ok:        #2fd98a;
            --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Cascadia Code", "Segoe UI Mono", Menlo, Consolas, monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
        }

        * { box-sizing: border-box; }

        html { height: 100%; }

        body {
            margin: 0;
            padding: clamp(16px, 4vw, 32px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: clamp(28px, 6vh, 56px);
            font-family: var(--font-sans);
            color: var(--ink);
            background: var(--bg);
            /* По вертикали не обрезаем: на низких экранах (телефон в альбомной
               ориентации) колонка выше вьюпорта и должна прокручиваться до кнопки. */
            overflow-x: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- atmosphere: grid + vignette ---- */
        .backdrop {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(120% 90% at 50% 0%, #15191f 0%, var(--bg) 60%),
                var(--bg);
        }
        .backdrop::before {
            content: '';
            position: absolute;
            inset: -2px;
            background-image:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 44px 44px;
            mask-image: radial-gradient(120% 80% at 50% 35%, #000 30%, transparent 78%);
            -webkit-mask-image: radial-gradient(120% 80% at 50% 35%, #000 30%, transparent 78%);
            opacity: .55;
        }
        .backdrop::after {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 200px 60px rgba(0,0,0,.7);
        }

        /* ---- top telemetry bar ---- */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: clamp(14px, 3vw, 22px) clamp(16px, 4vw, 28px);
            font-family: var(--font-mono);
            z-index: 5;
            pointer-events: none;
        }
        .brand {
            font-size: .68rem;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--muted);
        }
        .brand b { color: var(--ink); font-weight: 600; }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: .55em;
            padding: .4em .8em;
            border: 1px solid var(--line-2);
            border-radius: 999px;
            font-size: .66rem;
            font-weight: 600;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: var(--muted);
            background: rgba(255,255,255,.02);
            backdrop-filter: blur(4px);
            transition: color .3s ease, border-color .3s ease;
        }
        .connection-status .dot {
            width: .5em; height: .5em;
            border-radius: 50%;
            background: currentColor;
            flex: none;
        }
        .connection-status.connected { color: var(--ok); border-color: rgba(47,217,138,.3); }
        .connection-status.connected .dot {
            box-shadow: 0 0 8px var(--ok);
            animation: blip 2.2s ease-in-out infinite;
        }
        .connection-status.disconnected { color: var(--hot); border-color: rgba(255,59,48,.28); }

        /* ---- heading ---- */
        .head {
            text-align: center;
            animation: rise .8s .05s both cubic-bezier(.2,.8,.2,1);
        }
        .kicker {
            font-family: var(--font-mono);
            font-size: .7rem;
            letter-spacing: .42em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: .9em;
            opacity: .85;
        }
        h1 {
            margin: 0;
            font-size: clamp(2rem, 8vw, 3.4rem);
            font-weight: 800;
            letter-spacing: .04em;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, #b9c0c9 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ---- the gauge: persistent launch instrument ---- */
        .gauge {
            position: relative;
            width: clamp(230px, 72vw, 320px);
            aspect-ratio: 1;
            display: grid;
            place-items: center;
            animation: rise .9s .18s both cubic-bezier(.2,.8,.2,1);
        }
        .gauge::before { /* atmospheric glow */
            content: '';
            position: absolute;
            inset: -12%;
            border-radius: 50%;
            background: radial-gradient(circle, var(--amber-soft) 0%, transparent 64%);
            filter: blur(26px);
            opacity: .22;
            z-index: -1;
            transition: opacity .6s ease, background .6s ease;
            animation: breathe 4.5s ease-in-out infinite;
        }
        .gauge::after { /* launch flare */
            content: '';
            position: absolute;
            inset: 4%;
            border-radius: 50%;
            border: 2px solid var(--amber-2);
            opacity: 0;
            transform: scale(.7);
            pointer-events: none;
        }
        .gauge[data-state="armed"]::before { opacity: .5; }
        .gauge.hot::before {
            background: radial-gradient(circle, var(--hot-soft) 0%, transparent 64%);
            opacity: .8;
            animation-duration: .9s;
        }
        .gauge[data-state="launched"]::before {
            opacity: 1;
            background: radial-gradient(circle, #fff 0%, var(--amber) 38%, transparent 70%);
        }
        .gauge[data-state="launched"]::after { animation: flare .75s ease-out; }
        .gauge[data-state="cancelled"]::before {
            background: radial-gradient(circle, var(--hot-soft) 0%, transparent 64%);
            opacity: .55;
        }

        .gauge svg { width: 100%; height: 100%; display: block; }
        .ring-track {
            fill: none;
            stroke: var(--line-2);
            stroke-width: 3;
        }
        .ring-progress {
            fill: none;
            stroke: var(--amber);
            stroke-width: 5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 6px var(--amber-soft));
            transition: stroke-dashoffset 1s linear, stroke .45s ease, filter .45s ease;
        }
        .gauge.hot .ring-progress {
            stroke: var(--hot);
            filter: drop-shadow(0 0 10px var(--hot-soft));
        }
        .gauge[data-state="launched"] .ring-progress {
            stroke: var(--amber-2);
            filter: drop-shadow(0 0 14px #fff);
        }

        .gauge-core {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: .35em;
            text-align: center;
            padding: 0 14%;
        }
        .gauge-caption {
            font-family: var(--font-mono);
            font-size: .64rem;
            letter-spacing: .35em;
            text-transform: uppercase;
            color: var(--muted-2);
        }
        .gauge-value {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: clamp(2.6rem, 16vw, 5.6rem);
            line-height: 1;
            font-variant-numeric: tabular-nums;
            letter-spacing: -.02em;
            color: var(--ink);
            transition: color .4s ease;
        }
        .gauge[data-state="idle"] .gauge-value {
            font-size: clamp(1.3rem, 7vw, 2.2rem);
            letter-spacing: .18em;
            color: var(--muted);
        }
        .gauge[data-state="armed"] .gauge-value { color: var(--amber-2); text-shadow: 0 0 24px var(--amber-soft); }
        .gauge.hot .gauge-value { color: var(--hot); text-shadow: 0 0 24px var(--hot-soft); }
        .gauge[data-state="launched"] .gauge-value { animation: liftoff 1.1s ease-in both; }
        .gauge[data-state="cancelled"] .gauge-value {
            font-size: clamp(2rem, 10vw, 3.2rem);
            color: var(--hot);
        }
        .gauge-value.tick { animation: tick .42s cubic-bezier(.2,.9,.25,1); }

        .gauge-sub {
            font-family: var(--font-mono);
            font-size: .72rem;
            letter-spacing: .08em;
            color: var(--muted);
            min-height: 1.2em;
            max-width: 18ch;
            transition: color .3s ease;
        }
        .gauge-sub.flash { animation: subflash .5s ease; }

        /* ---- launch button ---- */
        .launch-btn {
            position: relative;
            appearance: none;
            border: none;
            cursor: pointer;
            padding: clamp(18px, 4vw, 22px) clamp(44px, 12vw, 72px);
            min-width: clamp(220px, 60vw, 280px);
            font-family: var(--font-mono);
            font-size: clamp(1rem, 4vw, 1.15rem);
            font-weight: 700;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: #1a0d02;
            background: linear-gradient(135deg, var(--amber-2), var(--amber));
            border-radius: 14px;
            box-shadow: 0 10px 30px -8px var(--amber-soft), inset 0 1px 0 rgba(255,255,255,.35);
            overflow: hidden;
            transition: transform .18s ease, box-shadow .25s ease, background .35s ease, color .35s ease;
            animation: rise 1s .3s both cubic-bezier(.2,.8,.2,1);
        }
        .launch-btn .btn-label { position: relative; z-index: 1; }
        .launch-btn::before { /* shimmer sweep */
            content: '';
            position: absolute;
            top: 0; left: -60%;
            width: 50%; height: 100%;
            background: linear-gradient(100deg, transparent, rgba(255,255,255,.55), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3.6s ease-in-out infinite;
        }
        .launch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 38px -8px var(--amber-soft), inset 0 1px 0 rgba(255,255,255,.45);
        }
        .launch-btn:active { transform: translateY(0); }
        .launch-btn:disabled {
            cursor: not-allowed;
            color: var(--muted-2);
            background: #1a1e24;
            box-shadow: inset 0 0 0 1px var(--line-2);
        }
        .launch-btn:disabled::before { display: none; }

        .launch-btn.cancel-btn {
            color: #fff;
            background: linear-gradient(135deg, #ff5b52, var(--hot));
            box-shadow: 0 10px 30px -8px var(--hot-soft), inset 0 1px 0 rgba(255,255,255,.3);
            animation: pulse-cancel 1.4s ease-in-out infinite;
        }
        .launch-btn.cancel-btn::before { display: none; }

        /* ---- keyframes ---- */
        @keyframes rise {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes breathe {
            0%, 100% { transform: scale(.96); }
            50%      { transform: scale(1.06); }
        }
        @keyframes tick {
            0%   { transform: scale(1.45); opacity: 0; filter: blur(2px); }
            60%  { opacity: 1; filter: blur(0); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes flare {
            0%   { opacity: .9; transform: scale(.7); }
            100% { opacity: 0; transform: scale(1.55); }
        }
        @keyframes liftoff {
            0%   { transform: translateY(0); opacity: 1; }
            70%  { transform: translateY(-26px); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }
        @keyframes blip {
            0%, 100% { opacity: 1; }
            50%      { opacity: .25; }
        }
        @keyframes shimmer {
            0% { left: -60%; }
            55%, 100% { left: 130%; }
        }
        @keyframes pulse-cancel {
            0%, 100% { box-shadow: 0 10px 30px -8px var(--hot-soft), inset 0 1px 0 rgba(255,255,255,.3); }
            50%      { box-shadow: 0 10px 44px -4px var(--hot), inset 0 1px 0 rgba(255,255,255,.3); }
        }
        @keyframes subflash {
            0%   { color: var(--amber-2); }
            100% { color: var(--muted); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-delay: 0s !important;
                animation-iteration-count: 1 !important;
                transition-duration: .12s !important;
            }
            /* liftoff с fill-mode both мгновенно застывает в конечном кадре
               (opacity:0) — не даём 🚀 исчезнуть у пользователей reduce-motion. */
            .gauge[data-state="launched"] .gauge-value { animation: none !important; }
        }
    </style>
</head>
<body>
    <div class="backdrop"></div>

    <div class="topbar">
        <div class="brand"><b>FIRESTARTER</b> // стартовый комплекс</div>
        <div class="connection-status disconnected" id="status">
            <span class="dot"></span><span id="statusText">Отключено</span>
        </div>
    </div>

    <div class="head">
        <div class="kicker">обратный отсчёт</div>
        <h1>Пуск ракеты</h1>
    </div>

    <div class="gauge" id="gauge" data-state="idle">
        <svg viewBox="0 0 280 280" aria-hidden="true">
            <g transform="rotate(-90 140 140)">
                <circle class="ring-track" cx="140" cy="140" r="120"></circle>
                <circle class="ring-progress" id="ringProgress" cx="140" cy="140" r="120"></circle>
            </g>
        </svg>
        <div class="gauge-core">
            <div class="gauge-caption">T — MINUS</div>
            <div class="gauge-value" id="countdown">ГОТОВ</div>
            <div class="gauge-sub" id="message">система готова к запуску</div>
        </div>
    </div>

    <button class='launch-btn' id="launchBtn" onclick='onLaunchBtn()'>
        <span class="btn-label">Запуск</span>
    </button>

    <script>
        const R = 120;
        const CIRC = 2 * Math.PI * R;

        let ws;
        let reconnectAttempts = 0;

        const statusEl    = document.getElementById('status');
        const statusText  = document.getElementById('statusText');
        const gaugeEl     = document.getElementById('gauge');
        const countdownEl = document.getElementById('countdown');
        const messageEl   = document.getElementById('message');
        const launchBtn   = document.getElementById('launchBtn');
        const btnLabel    = launchBtn.querySelector('.btn-label');
        const ringEl      = document.getElementById('ringProgress');

        // Инициализация кольца отсчёта: полное кольцо = шкала, прогресс скрыт.
        ringEl.style.strokeDasharray  = CIRC;
        ringEl.style.strokeDashoffset = CIRC;

        // Режим кнопки: 'idle' = Запуск, 'cancel' = Отмена.
        let btnMode = 'idle';
        // ID текущего запуска (из кадров отсчёта) — отправляем его в /cancel,
        // чтобы запоздавшая отмена не прервала уже следующий пуск.
        let launchId = null;
        // Стартовое значение отсчёта — задаёт масштаб кольца (приходит в countdown_start).
        let totalCount = null;
        // Таймер возврата в покой после пуска/отмены: храним хэндл, чтобы
        // новый отсчёт мог его погасить — иначе устаревший setIdle сбросит
        // живой отсчёт обратно в «ГОТОВ».
        let idleTimer = null;
        // Таймер очистки статусного сообщения (чтобы статус не застревал навсегда).
        let statusTimer = null;
        const IDLE_MSG = 'система готова к запуску';

        // fraction: 0..1 — доля оставшегося времени (заполненность дуги).
        function setRing(fraction) {
            const f = Math.max(0, Math.min(1, fraction));
            ringEl.style.strokeDashoffset = CIRC * (1 - f);
        }

        // Перезапуск «удара» цифры при каждом тике.
        function punch(text) {
            countdownEl.textContent = text;
            countdownEl.classList.remove('tick');
            void countdownEl.offsetWidth; // форсируем reflow для рестарта анимации
            countdownEl.classList.add('tick');
        }

        // Единая точка управления кнопкой: 'launch' | 'cancel' | 'locked'.
        function setButton(mode) {
            btnMode = (mode === 'cancel') ? 'cancel' : 'idle';
            launchBtn.disabled = (mode === 'locked');
            launchBtn.classList.toggle('cancel-btn', mode === 'cancel');
            btnLabel.textContent = (mode === 'cancel') ? 'Отмена' : 'Запуск';
        }

        function setIdle() {
            clearTimeout(idleTimer);
            idleTimer = null;
            launchId = null;
            totalCount = null;
            gaugeEl.dataset.state = 'idle';
            gaugeEl.classList.remove('hot');
            countdownEl.classList.remove('tick');
            countdownEl.textContent = 'ГОТОВ';
            messageEl.textContent = IDLE_MSG;
            setRing(0);
            // Кнопка запуска активна только при живом WS: вслепую не запускаем.
            const connected = ws && ws.readyState === WebSocket.OPEN;
            setButton(connected ? 'launch' : 'locked');
        }

        function setCancel() {
            setButton('cancel');
        }

        // Терминальное состояние (пуск/отмена): запираем кнопку, показываем глиф
        // и возвращаемся в покой по таймеру; новый отсчёт гасит этот таймер.
        function showFinal(state, glyph, message, idleDelay) {
            setButton('locked');
            gaugeEl.dataset.state = state;
            gaugeEl.classList.remove('hot');
            countdownEl.classList.remove('tick');
            countdownEl.textContent = glyph;
            messageEl.textContent = message;
            setRing(0);
            clearTimeout(idleTimer);
            idleTimer = setTimeout(setIdle, idleDelay);
        }

        function connectWS() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
            const proto = location.protocol === 'https:' ? 'wss' : 'ws';
            ws = new WebSocket(`${proto}://${location.host}/ws`);

            ws.onopen = () => {
                statusText.textContent = 'Подключено';
                statusEl.className = 'connection-status connected';
                reconnectAttempts = 0;
                // Базовое состояние после (пере)подключения: если идёт запуск,
                // сервер сразу пришлёт снапшот отсчёта и UI снова взведётся.
                setIdle();
            };
            ws.onmessage = (event) => {
                try { handleMessage(JSON.parse(event.data)); } catch (e) { console.error('WS parse error', e); }
            };
            ws.onclose = () => {
                statusText.textContent = 'Отключено';
                statusEl.className = 'connection-status disconnected';
                // Без связи запуск вслепую запрещён (отсчёт не был бы виден и
                // кнопка отмены не появилась бы); отмена идущего отсчёта остаётся доступной.
                if (btnMode !== 'cancel') launchBtn.disabled = true;
                // Переподключаемся бесконечно (с потолком 10 с): страница на
                // нестабильной точке доступа не должна умирать навсегда.
                reconnectAttempts++;
                const delay = Math.min(1000 * Math.pow(2, Math.min(reconnectAttempts, 4)), 10000);
                setTimeout(connectWS, delay);
            };
            ws.onerror = () => { /* ошибки отработаем через onclose */ };
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'countdown_start':
                    if (data.id != null) launchId = data.id;
                    clearTimeout(idleTimer);
                    // Масштаб кольца берём из кадра: сервер шлёт count и в снапшоте
                    // позднему клиенту, так что шкала верна и при переподключении.
                    totalCount = data.count || 9;
                    setCancel();
                    gaugeEl.dataset.state = 'armed';
                    gaugeEl.classList.remove('hot');
                    countdownEl.textContent = '—';
                    messageEl.textContent = 'обратный отсчёт пошёл';
                    setRing(1);
                    break;

                case 'countdown':
                    if (data.id != null) launchId = data.id;
                    clearTimeout(idleTimer);
                    if (totalCount == null) totalCount = 9; // контракт: счёт всегда от 9
                    setCancel();
                    gaugeEl.dataset.state = 'armed';
                    punch(data.count);
                    setRing(data.count / totalCount);
                    gaugeEl.classList.toggle('hot', data.count <= 3);
                    break;

                case 'launch':
                    // Зафиксировано: отмена больше недоступна. Сервер занят ещё
                    // ~4 с (тон 2 с + импульс MOSFET 2 с) — держим кнопку запертой
                    // до конца, чтобы клик не ушёл в молчаливый отказ.
                    showFinal('launched', '🚀', data.message || 'Пуск!', 4200);
                    break;

                case 'cancelled':
                    showFinal('cancelled', '✕', data.message || 'Запуск отменён', 2600);
                    break;

                case 'status':
                    messageEl.textContent = data.message;
                    messageEl.classList.remove('flash');
                    void messageEl.offsetWidth;
                    messageEl.classList.add('flash');
                    // Статус не должен застревать навсегда: в покое возвращаем
                    // подпись готовности (как авто-скрытие в старом UI).
                    clearTimeout(statusTimer);
                    statusTimer = setTimeout(() => {
                        if (gaugeEl.dataset.state === 'idle') messageEl.textContent = IDLE_MSG;
                    }, 5000);
                    break;

                default:
                    console.log('Unknown msg', data);
            }
        }

        function onLaunchBtn() {
            if (launchBtn.disabled) return;
            if (btnMode === 'cancel') {
                cancelLaunch();
            } else {
                launchRocket();
            }
        }

        function launchRocket() {
            fetch('/launch');
        }

        function cancelLaunch() {
            const q = (launchId != null) ? ('?id=' + encodeURIComponent(launchId)) : '';
            fetch('/cancel' + q);
        }

        window.onload = connectWS;
        window.onbeforeunload = () => { if (ws) try { ws.close(); } catch(e){} };
    </script>
</body>
</html>
